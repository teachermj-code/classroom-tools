<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher MJ | Interactive Math Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top center, #1e293b 0%, #0f172a 100%); color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .shimmer { background: linear-gradient(90deg, #60a5fa, #c084fc, #4ade80, #60a5fa); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 5s linear infinite; }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full text-center">
        <h1 class="text-5xl font-black mb-2 uppercase tracking-tighter">Teacher <span class="shimmer">MJ</span></h1>
        <p class="text-slate-400 mb-12 font-medium tracking-widest uppercase text-xs">Mathematics Innovation Hub</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="mind-game.html" class="glass p-8 rounded-3xl hover:bg-white/10 transition-all group border-b-4 border-blue-500">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🧠</div>
                <h2 class="text-xl font-bold mb-2">Mind Your Decisions</h2>
                <p class="text-slate-500 text-sm">Strategic review game with mystery boxes and bonus points.</p>
            </a>

            <a href="quiz-master.html" class="glass p-8 rounded-3xl hover:bg-white/10 transition-all group border-b-4 border-emerald-500">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🏆</div>
                <h2 class="text-xl font-bold mb-2">Quiz Master Pro</h2>
                <p class="text-slate-500 text-sm">Tiered competition engine with CSV/Excel support and KaTeX.</p>
            </a>
        </div>

        <div class="mt-12 text-[10px] text-slate-600 font-bold tracking-widest uppercase">
            Developed for DepEd Mathematics • 2026
        </div>
    </div>
</body>
</html>
